# =============================================================================
# JSF-Core Configuration File
# =============================================================================
# Copy this file to config.yml and edit the values.
# config.yml is in .gitignore — your secrets stay local.
#
# Usage in code:
#   from jsf.config import load_config
#   cfg = load_config("config.yml")
# =============================================================================

# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------
environment: development          # development | staging | production
log_level: INFO                   # DEBUG | INFO | WARNING | ERROR

# -----------------------------------------------------------------------------
# Backtesting Defaults
# -----------------------------------------------------------------------------
backtest:
  initial_capital: 100000         # Starting portfolio value (USD)
  transaction_cost: 0.001         # 10 basis points per trade
  slippage: 0.0005                # 5 basis points slippage
  benchmark: "SPY"                # Benchmark symbol for relative metrics
  risk_free_rate: 0.05            # Annual risk-free rate (5%)

# -----------------------------------------------------------------------------
# Broker / Live Trading
# -----------------------------------------------------------------------------
broker:
  provider: alpaca                # alpaca | interactive_brokers | none
  mode: paper                     # paper | live
  alpaca:
    api_key: ""                   # Set here OR in .env as ALPACA_API_KEY
    secret_key: ""                # Set here OR in .env as ALPACA_SECRET_KEY
    base_url: https://paper-api.alpaca.markets
  interactive_brokers:
    host: 127.0.0.1
    port: 7497                    # 7497 = TWS paper | 7496 = TWS live
    client_id: 1

# -----------------------------------------------------------------------------
# Data Sources
# -----------------------------------------------------------------------------
data:
  default_source: synthetic       # synthetic | alpaca | yfinance | alpha_vantage
  cache_dir: .cache/data          # Local cache directory for downloaded data
  alpha_vantage:
    api_key: ""                   # Set here OR in .env as ALPHA_VANTAGE_API_KEY
  yfinance:
    enabled: true

# -----------------------------------------------------------------------------
# Dashboard
# -----------------------------------------------------------------------------
dashboard:
  symbols:                        # Symbols to monitor in demo mode
    - AAPL
    - GOOGL
    - MSFT
    - AMZN
    - NVDA
  initial_capital: 100000
  history_days: 90                # Days of historical data for mock mode
  refresh_interval: 30            # Auto-refresh in seconds (0 = off)
  port: 8501

# -----------------------------------------------------------------------------
# Alerts
# -----------------------------------------------------------------------------
alerts:
  enabled: true
  min_severity: INFO              # INFO | WARNING | ERROR | CRITICAL
  channels:
    console: true
    telegram:
      enabled: false              # Set to true after configuring bot
      bot_token: ""               # Set here OR in .env as TELEGRAM_BOT_TOKEN
      chat_ids:                   # List of chat IDs to notify
        - ""                      # Set here OR in .env as TELEGRAM_CHAT_IDS
    email:
      enabled: false
      smtp_host: smtp.gmail.com
      smtp_port: 587
      username: ""
      password: ""
      recipients: []

# -----------------------------------------------------------------------------
# Machine Learning (requires jsf-core[ml])
# -----------------------------------------------------------------------------
ml:
  model_dir: .cache/models        # Where trained models are saved
  finbert:
    model_name: ProsusAI/finbert  # HuggingFace model ID
    cache_dir: .cache/huggingface
    device: cpu                   # cpu | cuda | mps
